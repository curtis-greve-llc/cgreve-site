backend:
  name: git-gateway
  branch: main

media_folder: "images/blog"
public_folder: "/images/blog"

collections:
  - name: "posts"
    label: "Blog Posts"
    folder: "posts"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Category", name: "category", widget: "select", options: ["Market Intelligence", "Liquidation Buying", "Industry Trends", "Consulting", "Operations", "RFP & Vendor Selection"] }
      - { label: "Excerpt (shown on homepage & blog list)", name: "excerpt", widget: "string" }
      - { label: "Meta Description (for Google)", name: "meta_description", widget: "string" }
      - { label: "Body", name: "body", widget: "markdown" }
      - { label: "Layout", name: "layout", widget: "hidden", default: "post.njk" }
